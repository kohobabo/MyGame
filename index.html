<!DOCTYPE html>
<html lang="ko" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 메모장 - Smart Notepad</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts & Icon CDN -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
        }
        /* Custom scrollbar for premium look */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }
    </style>
</head>
<body class="h-full bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-200 overflow-hidden">

    <!-- App Container -->
    <div class="flex h-full w-full overflow-hidden relative">

        <!-- Custom toast notification container -->
        <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2 max-w-sm w-full pointer-events-none"></div>

        <!-- Sidebar: Hidden on mobile by default, dynamic class control -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-30 flex flex-col w-80 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out md:relative">
            
            <!-- Sidebar Header -->
            <div class="p-4 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-brand-500 rounded-lg flex items-center justify-center text-white font-bold">
                        <i class="fa-solid fa-note-sticky"></i>
                    </div>
                    <span class="font-bold text-lg tracking-tight bg-gradient-to-r from-brand-600 to-indigo-500 bg-clip-text text-transparent dark:from-brand-100 dark:to-indigo-300">스마트 메모장</span>
                </div>
                
                <!-- Dark Mode / Theme Toggle -->
                <button id="theme-toggle" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 focus:outline-none transition-colors" aria-label="테마 변경">
                    <i id="theme-icon" class="fa-solid fa-moon"></i>
                </button>
            </div>

            <!-- Search & Write Button -->
            <div class="p-4 space-y-3">
                <button id="btn-new-note" class="w-full py-2.5 px-4 bg-brand-600 hover:bg-brand-700 text-white rounded-xl font-medium shadow-md hover:shadow-lg transition-all duration-150 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-plus"></i> 새 메모 작성
                </button>
                
                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                    <input id="search-input" type="text" placeholder="메모 검색..." class="w-full pl-10 pr-4 py-2 bg-slate-100 dark:bg-slate-700/50 border border-transparent focus:border-brand-500 rounded-xl text-sm focus:outline-none transition-all">
                </div>
            </div>

            <!-- Category Filter List -->
            <div class="px-4 py-2 border-b border-slate-200 dark:border-slate-700">
                <p class="text-xs font-semibold uppercase text-slate-400 dark:text-slate-500 tracking-wider mb-2">폴더 및 필터</p>
                <nav class="space-y-1" id="category-filter-list">
                    <!-- Dynamic rendering of filters -->
                    <button data-filter="all" class="filter-btn w-full flex items-center justify-between px-3 py-1.5 rounded-lg text-sm font-medium bg-brand-50 dark:bg-slate-700 text-brand-600 dark:text-indigo-300">
                        <span class="flex items-center gap-2"><i class="fa-solid fa-folder-open text-xs"></i> 전체 메모</span>
                        <span id="count-all" class="text-xs bg-brand-200/50 dark:bg-slate-600 px-2 py-0.5 rounded-full">0</span>
                    </button>
                    <button data-filter="pinned" class="filter-btn w-full flex items-center justify-between px-3 py-1.5 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700/50">
                        <span class="flex items-center gap-2"><i class="fa-solid fa-thumbtack text-xs text-amber-500"></i> 중요 메모</span>
                        <span id="count-pinned" class="text-xs bg-slate-200/50 dark:bg-slate-700 px-2 py-0.5 rounded-full">0</span>
                    </button>
                    <div class="h-[1px] bg-slate-200 dark:bg-slate-700 my-2"></div>
                    <!-- Tag categories -->
                    <button data-filter="work" class="filter-btn w-full flex items-center justify-between px-3 py-1.5 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700/50">
                        <span class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-blue-500"></span> 업무</span>
                        <span id="count-work" class="text-xs bg-slate-200/50 dark:bg-slate-700 px-2 py-0.5 rounded-full">0</span>
                    </button>
                    <button data-filter="personal" class="filter-btn w-full flex items-center justify-between px-3 py-1.5 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700/50">
                        <span class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-emerald-500"></span> 개인</span>
                        <span id="count-personal" class="text-xs bg-slate-200/50 dark:bg-slate-700 px-2 py-0.5 rounded-full">0</span>
                    </button>
                    <button data-filter="ideas" class="filter-btn w-full flex items-center justify-between px-3 py-1.5 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700/50">
                        <span class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-purple-500"></span> 아이디어</span>
                        <span id="count-ideas" class="text-xs bg-slate-200/50 dark:bg-slate-700 px-2 py-0.5 rounded-full">0</span>
                    </button>
                    <button data-filter="uncategorized" class="filter-btn w-full flex items-center justify-between px-3 py-1.5 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700/50">
                        <span class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-slate-400"></span> 미분류</span>
                        <span id="count-uncategorized" class="text-xs bg-slate-200/50 dark:bg-slate-700 px-2 py-0.5 rounded-full">0</span>
                    </button>
                    <div class="h-[1px] bg-slate-200 dark:bg-slate-700 my-2"></div>
                    <!-- Trash Category -->
                    <button data-filter="trash" class="filter-btn w-full flex items-center justify-between px-3 py-1.5 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-red-50 dark:hover:bg-red-950/20 hover:text-red-600 dark:hover:text-red-400">
                        <span class="flex items-center gap-2"><i class="fa-solid fa-trash-can text-xs"></i> 휴지통</span>
                        <span id="count-trash" class="text-xs bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-300 px-2 py-0.5 rounded-full">0</span>
                    </button>
                </nav>
            </div>

            <!-- Notes List Header and Body Container -->
            <div class="flex-1 overflow-y-auto" id="notes-list-container">
                <div class="p-3 text-xs font-semibold uppercase text-slate-400 dark:text-slate-500 tracking-wider">메모 목록</div>
                <div id="notes-list" class="divide-y divide-slate-100 dark:divide-slate-700/50">
                    <!-- Dynamic notes injected here -->
                </div>
            </div>

            <!-- Sidebar Footer Settings/Backup -->
            <div class="p-4 border-t border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/80 flex items-center justify-between gap-2 text-xs">
                <button id="btn-export" class="flex-1 py-1.5 px-2 bg-slate-200 hover:bg-slate-300 dark:bg-slate-700 dark:hover:bg-slate-600 rounded-lg font-medium transition-colors flex items-center justify-center gap-1">
                    <i class="fa-solid fa-download"></i> 백업 내보내기
                </button>
                <button id="btn-import-trigger" class="flex-1 py-1.5 px-2 bg-slate-200 hover:bg-slate-300 dark:bg-slate-700 dark:hover:bg-slate-600 rounded-lg font-medium transition-colors flex items-center justify-center gap-1">
                    <i class="fa-solid fa-upload"></i> 불러오기
                </button>
                <input type="file" id="import-file" class="hidden" accept=".json">
            </div>
        </aside>

        <!-- Responsive sidebar backdrop -->
        <div id="sidebar-backdrop" class="fixed inset-0 bg-slate-900/40 z-20 hidden md:hidden"></div>

        <!-- Main Panel: Editor & View Mode -->
        <main class="flex-1 flex flex-col h-full bg-white dark:bg-slate-900 overflow-hidden relative">
            
            <!-- Mobile Navigation Bar -->
            <header class="flex items-center justify-between px-4 py-3 md:py-4 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 md:hidden">
                <div class="flex items-center gap-3">
                    <button id="btn-toggle-sidebar" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 focus:outline-none">
                        <i class="fa-solid fa-bars text-lg"></i>
                    </button>
                    <span class="font-bold text-slate-800 dark:text-slate-100">스마트 메모장</span>
                </div>
                <button id="btn-mobile-new" class="w-8 h-8 bg-brand-600 rounded-full flex items-center justify-center text-white text-sm shadow-sm">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </header>

            <!-- Editor Work Area -->
            <div id="editor-wrapper" class="flex-1 flex flex-col h-full overflow-hidden hidden">
                <!-- Editor Header Toolbar -->
                <div class="px-6 py-3 border-b border-slate-200 dark:border-slate-700 flex flex-wrap items-center justify-between gap-3 bg-slate-50/50 dark:bg-slate-800/40">
                    
                    <!-- Left tools: Category & Pins -->
                    <div class="flex items-center gap-2">
                        <!-- Category Tag selector -->
                        <div class="relative">
                            <select id="editor-category" class="appearance-none pl-3 pr-8 py-1.5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm font-medium focus:outline-none focus:border-brand-500 cursor-pointer">
                                <option value="uncategorized">미분류</option>
                                <option value="work">업무</option>
                                <option value="personal">개인</option>
                                <option value="ideas">아이디어</option>
                            </select>
                            <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-xs text-slate-400"></i>
                        </div>

                        <!-- Pin Action -->
                        <button id="btn-editor-pin" class="p-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-400 dark:text-slate-500 transition-colors" title="상단 고정">
                            <i class="fa-solid fa-thumbtack text-sm"></i>
                        </button>
                    </div>

                    <!-- Right tools: Auto-save status, Export single note, Trash/Delete -->
                    <div class="flex items-center gap-2">
                        <!-- Save Indicator -->
                        <span id="save-status" class="text-xs text-slate-400 dark:text-slate-500 flex items-center gap-1.5 mr-2">
                            <i class="fa-solid fa-circle-check text-emerald-500"></i> 저장됨
                        </span>

                        <button id="btn-export-txt" class="p-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-400 transition-colors" title="텍스트 파일로 다운로드">
                            <i class="fa-solid fa-file-arrow-down"></i>
                        </button>

                        <button id="btn-editor-delete" class="p-2 rounded-lg hover:bg-red-100 dark:hover:bg-red-900/30 text-red-600 dark:text-red-400 transition-colors" title="메모 삭제">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                </div>

                <!-- Input Canvas -->
                <div class="flex-1 flex flex-col p-6 overflow-hidden">
                    <!-- Date & Word counter overlay -->
                    <div class="flex items-center justify-between text-xs text-slate-400 dark:text-slate-500 mb-2">
                        <span id="editor-date">최근 수정: -</span>
                    </div>

                    <!-- Note Title Input -->
                    <input id="editor-title" type="text" placeholder="제목을 입력하세요..." class="w-full text-2xl font-bold bg-transparent border-none outline-none placeholder-slate-300 dark:placeholder-slate-600 mb-4 focus:ring-0">
                    
                    <!-- Formatting helpers for visual text injection (simulate quick rich formatting helpers) -->
                    <div class="flex items-center gap-1 pb-3 mb-3 border-b border-slate-100 dark:border-slate-800">
                        <button data-format="bold" class="format-btn p-1.5 rounded hover:bg-slate-100 dark:hover:bg-slate-800 text-xs text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-slate-200 font-bold" title="굵게">B</button>
                        <button data-format="italic" class="format-btn p-1.5 rounded hover:bg-slate-100 dark:hover:bg-slate-800 text-xs text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-slate-200 italic" title="기울임">I</button>
                        <button data-format="list" class="format-btn p-1.5 rounded hover:bg-slate-100 dark:hover:bg-slate-800 text-xs text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-slate-200" title="리스트"><i class="fa-solid fa-list-ul"></i></button>
                        <button data-format="todo" class="format-btn p-1.5 rounded hover:bg-slate-100 dark:hover:bg-slate-800 text-xs text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-slate-200" title="체크리스트"><i class="fa-regular fa-square-check"></i></button>
                        <button data-format="time" class="format-btn p-1.5 rounded hover:bg-slate-100 dark:hover:bg-slate-800 text-xs text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-slate-200" title="현재 시간"><i class="fa-regular fa-clock"></i></button>
                    </div>

                    <!-- Note Content Body (Textarea) -->
                    <textarea id="editor-content" placeholder="이곳에 메모를 자유롭게 입력하세요. 자동 저장됩니다..." class="w-full flex-1 bg-transparent border-none outline-none resize-none placeholder-slate-300 dark:placeholder-slate-600 focus:ring-0 leading-relaxed text-slate-700 dark:text-slate-300"></textarea>
                </div>

                <!-- Footer Status Bar -->
                <footer class="px-6 py-2 border-t border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/30 flex items-center justify-between text-xs text-slate-400">
                    <div class="flex gap-4">
                        <span>글자 수: <strong id="char-count" class="font-medium">0</strong>자</span>
                        <span>공백 제외: <strong id="char-no-space-count" class="font-medium">0</strong>자</span>
                    </div>
                    <div>
                        <span id="trash-warning" class="text-red-500 dark:text-red-400 hidden"><i class="fa-solid fa-triangle-exclamation"></i> 휴지통 메모는 편집할 수 없습니다.</span>
                    </div>
                </footer>
            </div>

            <!-- Welcome View (when no note is selected) -->
            <div id="empty-wrapper" class="flex-1 flex flex-col items-center justify-center p-6 text-center">
                <div class="w-20 h-20 bg-brand-50 dark:bg-slate-800 rounded-3xl flex items-center justify-center text-brand-500 text-3xl mb-4 animate-bounce">
                    <i class="fa-solid fa-pen-fancy"></i>
                </div>
                <h3 class="text-lg font-bold text-slate-800 dark:text-slate-200 mb-1">작성된 메모가 없습니다</h3>
                <p class="text-sm text-slate-400 dark:text-slate-500 max-w-sm mb-6">스마트 메모장을 사용하여 오늘 하루의 영감, 할 일 목록, 아이디어를 자유롭게 기록해보세요.</p>
                <button id="btn-empty-new" class="py-2.5 px-6 bg-brand-600 hover:bg-brand-700 text-white rounded-xl font-medium shadow-md transition-all flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> 첫 메모 시작하기
                </button>
            </div>
        </main>
    </div>

    <script>
        // --- Core Application State ---
        let state = {
            notes: [],
            activeNoteId: null,
            currentFilter: 'all', // all, pinned, work, personal, ideas, uncategorized, trash
            searchQuery: '',
            theme: 'light',
            saveTimeout: null
        };

        // --- DOM Elements Selectors ---
        const elements = {
            sidebar: document.getElementById('sidebar'),
            sidebarBackdrop: document.getElementById('sidebar-backdrop'),
            btnToggleSidebar: document.getElementById('btn-toggle-sidebar'),
            btnNewNote: document.getElementById('btn-new-note'),
            btnMobileNew: document.getElementById('btn-mobile-new'),
            btnEmptyNew: document.getElementById('btn-empty-new'),
            searchInput: document.getElementById('search-input'),
            notesList: document.getElementById('notes-list'),
            categoryFilters: document.querySelectorAll('.filter-btn'),
            themeToggle: document.getElementById('theme-toggle'),
            themeIcon: document.getElementById('theme-icon'),
            
            // Editor Elements
            editorWrapper: document.getElementById('editor-wrapper'),
            emptyWrapper: document.getElementById('empty-wrapper'),
            editorCategory: document.getElementById('editor-category'),
            btnEditorPin: document.getElementById('btn-editor-pin'),
            btnEditorDelete: document.getElementById('btn-editor-delete'),
            btnExportTxt: document.getElementById('btn-export-txt'),
            editorDate: document.getElementById('editor-date'),
            editorTitle: document.getElementById('editor-title'),
            editorContent: document.getElementById('editor-content'),
            saveStatus: document.getElementById('save-status'),
            charCount: document.getElementById('char-count'),
            charNoSpaceCount: document.getElementById('char-no-space-count'),
            trashWarning: document.getElementById('trash-warning'),
            
            // Backup/Import
            btnExport: document.getElementById('btn-export'),
            btnImportTrigger: document.getElementById('btn-import-trigger'),
            importFile: document.getElementById('import-file'),
            toastContainer: document.getElementById('toast-container'),
            formatBtns: document.querySelectorAll('.format-btn')
        };

        // --- Custom Toast Notification ---
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `flex items-center gap-3 px-4 py-3 bg-white dark:bg-slate-800 border-l-4 shadow-lg rounded-r-xl translate-x-10 opacity-0 transition-all duration-300 pointer-events-auto`;
            
            let colorClass = 'border-brand-500';
            let icon = '<i class="fa-solid fa-circle-check text-brand-500"></i>';
            if (type === 'danger') {
                colorClass = 'border-red-500';
                icon = '<i class="fa-solid fa-circle-exclamation text-red-500"></i>';
            } else if (type === 'warning') {
                colorClass = 'border-amber-500';
                icon = '<i class="fa-solid fa-triangle-exclamation text-amber-500"></i>';
            }

            toast.classList.add(colorClass);
            toast.innerHTML = `
                <div class="text-sm">${icon}</div>
                <div class="text-xs font-medium text-slate-700 dark:text-slate-300">${message}</div>
            `;
            
            elements.toastContainer.appendChild(toast);
            
            // Trigger animation
            setTimeout(() => {
                toast.classList.remove('translate-x-10', 'opacity-0');
            }, 10);
            
            // Self destruction
            setTimeout(() => {
                toast.classList.add('translate-x-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // --- STREAMING_CHUNK: LocalStorage Syncing Logic ---
        function loadState() {
            try {
                const savedNotes = localStorage.getItem('notepad_notes');
                const savedTheme = localStorage.getItem('notepad_theme');
                
                state.notes = savedNotes ? JSON.parse(savedNotes) : getMockNotes();
                state.theme = savedTheme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                
                // Active note mapping
                const savedActiveId = localStorage.getItem('notepad_active_id');
                if (savedActiveId && state.notes.some(n => n.id === savedActiveId)) {
                    state.activeNoteId = savedActiveId;
                }
            } catch (e) {
                console.error("Failed to load state", e);
                state.notes = getMockNotes();
            }
        }

        function saveNotesToStorage() {
            try {
                localStorage.setItem('notepad_notes', JSON.stringify(state.notes));
            } catch (e) {
                showToast("메모 저장 용량이 초과되었거나 오류가 발생했습니다.", "danger");
            }
        }

        function setAutoSaveStatus(status) {
            if (status === 'saving') {
                elements.saveStatus.innerHTML = `<i class="fa-solid fa-spinner animate-spin text-brand-500"></i> 저장 중...`;
            } else if (status === 'saved') {
                elements.saveStatus.innerHTML = `<i class="fa-solid fa-circle-check text-emerald-500"></i> 저장됨`;
            }
        }

        // Default Mock Notes
        function getMockNotes() {
            const now = new Date();
            return [
                {
                    id: 'welcome-note-1',
                    title: '💡 스마트 메모장 시작하기',
                    content: '환영합니다! 이곳은 생각을 정리하고 기록할 수 있는 나만의 똑똑한 메모 공간입니다.\n\n[주요 기능 요약]\n1. 실시간 자동저장: 글을 적기만 하세요. 타이핑하는 순간 안전하게 저장됩니다.\n2. 카테고리 태그: 업무, 개인용, 중요한 아이디어 등 폴더별로 나누어 정리하세요.\n3. 다크모드 지원: 좌측 상단의 달 모양 아이콘을 눌러 테마를 바꿔보세요.\n4. 중요 메모 고정: 꼭 기억해야 할 노트를 핀(Pin)으로 최상단에 올리세요.\n5. 휴지통: 실수로 지운 메모는 휴지통에서 언제든 안전하게 되살릴 수 있습니다.\n\n언제나 당신의 멋진 아이디어를 이 자리에서 수놓아 가세요!',
                    category: 'ideas',
                    isPinned: true,
                    isTrashed: false,
                    updatedAt: now.toISOString()
                },
                {
                    id: 'welcome-note-2',
                    title: '📋 오늘의 할 일 목록',
                    content: '- [x] 오전 10시 기획 회의 참여하기\n- [ ] 피드백 바탕으로 기획안 1차 수정 및 공유\n- [ ] 저녁에 30분 러닝 뛰고 가벼운 스트레칭\n- [ ] 장보기 목록: 사과, 아보카도, 두유, 계란\n- [ ] 읽고 싶었던 소설 책 5챕터까지 읽기',
                    category: 'work',
                    isPinned: false,
                    isTrashed: false,
                    updatedAt: new Date(now.getTime() - 3600000).toISOString() // 1 hour ago
                }
            ];
        }

        // --- STREAMING_CHUNK: Main Render Logic ---
        function updateCounters() {
            // Recalculate filters counts
            const activeNotes = state.notes.filter(n => !n.isTrashed);
            const trashedNotes = state.notes.filter(n => n.isTrashed);

            document.getElementById('count-all').innerText = activeNotes.length;
            document.getElementById('count-pinned').innerText = activeNotes.filter(n => n.isPinned).length;
            document.getElementById('count-work').innerText = activeNotes.filter(n => n.category === 'work').length;
            document.getElementById('count-personal').innerText = activeNotes.filter(n => n.category === 'personal').length;
            document.getElementById('count-ideas').innerText = activeNotes.filter(n => n.category === 'ideas').length;
            document.getElementById('count-uncategorized').innerText = activeNotes.filter(n => n.category === 'uncategorized').length;
            document.getElementById('count-trash').innerText = trashedNotes.length;
        }

        function formatDate(isoString) {
            const d = new Date(isoString);
            return `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일 ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
        }

        function renderNoteList() {
            elements.notesList.innerHTML = '';
            
            // Filter and sort mechanism
            let filtered = state.notes;
            
            // 1. Search Query Filter
            if (state.searchQuery.trim() !== '') {
                const query = state.searchQuery.toLowerCase();
                filtered = filtered.filter(n => 
                    n.title.toLowerCase().includes(query) || 
                    n.content.toLowerCase().includes(query)
                );
            }

            // 2. Folder/Category Filter
            if (state.currentFilter === 'trash') {
                filtered = filtered.filter(n => n.isTrashed);
            } else {
                // Ignore trashed notes in regular folders
                filtered = filtered.filter(n => !n.isTrashed);
                
                if (state.currentFilter === 'pinned') {
                    filtered = filtered.filter(n => n.isPinned);
                } else if (state.currentFilter !== 'all') {
                    filtered = filtered.filter(n => n.category === state.currentFilter);
                }
            }

            // 3. Sorting: Pinned first, then latest updated
            filtered.sort((a, b) => {
                if (state.currentFilter !== 'trash') {
                    if (a.isPinned && !b.isPinned) return -1;
                    if (!a.isPinned && b.isPinned) return 1;
                }
                return new Date(b.updatedAt) - new Date(a.updatedAt);
            });

            // Display message when list is empty
            if (filtered.length === 0) {
                elements.notesList.innerHTML = `
                    <div class="p-8 text-center text-slate-400 dark:text-slate-500 text-xs">
                        <i class="fa-solid fa-folder-open text-xl mb-2 block opacity-50"></i>
                        목록이 비어 있습니다.
                    </div>
                `;
                return;
            }

            // Loop and draw list items
            filtered.forEach(note => {
                const isActive = note.id === state.activeNoteId;
                const noteCard = document.createElement('div');
                noteCard.className = `p-4 cursor-pointer relative group transition-all border-b border-slate-100 dark:border-slate-800/60 hover:bg-slate-50 dark:hover:bg-slate-700/30 ${isActive ? 'bg-brand-50/50 dark:bg-slate-800 border-l-4 border-l-brand-500' : ''}`;
                
                // Color dots based on category
                let categoryColor = 'bg-slate-400';
                if (note.category === 'work') categoryColor = 'bg-blue-500';
                else if (note.category === 'personal') categoryColor = 'bg-emerald-500';
                else if (note.category === 'ideas') categoryColor = 'bg-purple-500';

                // Format content excerpt
                const excerpt = note.content ? note.content.replace(/\n/g, ' ').substring(0, 50) + (note.content.length > 50 ? '...' : '') : '내용 없음';
                const formattedTime = formatDate(note.updatedAt);

                noteCard.innerHTML = `
                    <div class="flex items-start justify-between gap-2">
                        <div class="flex items-center gap-1.5 overflow-hidden">
                            <span class="w-1.5 h-1.5 rounded-full ${categoryColor} shrink-0"></span>
                            <h4 class="font-bold text-sm truncate text-slate-800 dark:text-slate-100">${note.title || '제목 없음'}</h4>
                        </div>
                        <div class="flex items-center gap-1.5 shrink-0">
                            ${note.isPinned && !note.isTrashed ? '<i class="fa-solid fa-thumbtack text-amber-500 text-xs"></i>' : ''}
                        </div>
                    </div>
                    <p class="text-xs text-slate-500 dark:text-slate-400 mt-1 line-clamp-2 leading-relaxed">${excerpt}</p>
                    <div class="flex items-center justify-between mt-2.5">
                        <span class="text-[10px] text-slate-400 font-medium">${formattedTime}</span>
                        ${note.isTrashed ? `
                            <button data-id="${note.id}" class="btn-restore p-1 hover:text-emerald-600 dark:hover:text-emerald-400 transition-colors" title="복원하기">
                                <i class="fa-solid fa-trash-arrow-up text-xs"></i>
                            </button>
                        ` : ''}
                    </div>
                `;

                // Handle click on list card to open note
                noteCard.addEventListener('click', (e) => {
                    // Prevent switching if restoration icon clicked
                    if (e.target.closest('.btn-restore')) {
                        return;
                    }
                    selectNote(note.id);
                    // Mobile sidebar auto-closing
                    if (window.innerWidth < 768) {
                        elements.sidebar.classList.add('-translate-x-full');
                        elements.sidebarBackdrop.classList.add('hidden');
                    }
                });

                // Attach restoration hook
                const restoreBtn = noteCard.querySelector('.btn-restore');
                if (restoreBtn) {
                    restoreBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        restoreNote(note.id);
                    });
                }

                elements.notesList.appendChild(noteCard);
            });
        }

        // --- STREAMING_CHUNK: Note Editing & Loading Management ---
        function selectNote(noteId) {
            state.activeNoteId = noteId;
            localStorage.setItem('notepad_active_id', noteId);
            
            const note = state.notes.find(n => n.id === noteId);
            if (!note) {
                elements.editorWrapper.classList.add('hidden');
                elements.emptyWrapper.classList.remove('hidden');
                return;
            }

            elements.emptyWrapper.classList.add('hidden');
            elements.editorWrapper.classList.remove('hidden');

            // Set inputs values
            elements.editorTitle.value = note.title;
            elements.editorContent.value = note.content;
            elements.editorCategory.value = note.category;
            elements.editorDate.innerText = `최근 수정: ${formatDate(note.updatedAt)}`;
            
            // Adjust Pin state visual icon
            if (note.isPinned) {
                elements.btnEditorPin.className = "p-2 rounded-lg bg-amber-50 dark:bg-amber-950/20 text-amber-500 transition-colors";
            } else {
                elements.btnEditorPin.className = "p-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-400 dark:text-slate-500 transition-colors";
            }

            // Adjust form availability if notes inside trash
            if (note.isTrashed) {
                elements.editorTitle.disabled = true;
                elements.editorContent.disabled = true;
                elements.editorCategory.disabled = true;
                elements.btnEditorPin.disabled = true;
                elements.btnEditorPin.classList.add('opacity-40');
                elements.trashWarning.classList.remove('hidden');
                elements.btnEditorDelete.title = "영구 삭제";
                elements.btnEditorDelete.innerHTML = `<i class="fa-solid fa-skull-crossbones text-red-600"></i>`;
            } else {
                elements.editorTitle.disabled = false;
                elements.editorContent.disabled = false;
                elements.editorCategory.disabled = false;
                elements.btnEditorPin.disabled = false;
                elements.btnEditorPin.classList.remove('opacity-40');
                elements.trashWarning.classList.add('hidden');
                elements.btnEditorDelete.title = "휴지통으로 이동";
                elements.btnEditorDelete.innerHTML = `<i class="fa-solid fa-trash-can"></i>`;
            }

            countCharacters();
            renderNoteList();
        }

        // --- STREAMING_CHUNK: Writing Helpers & Formats Injection ---
        // Basic Markdown helper injecting to editor cursor position
        function injectFormatting(type) {
            const textarea = elements.editorContent;
            if (textarea.disabled) return;

            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;
            const selectedText = text.substring(start, end);
            
            let replacement = '';
            let cursorOffset = 0;

            switch (type) {
                case 'bold':
                    replacement = `**${selectedText || '텍스트'}**`;
                    cursorOffset = selectedText ? replacement.length : 2;
                    break;
                case 'italic':
                    replacement = `*${selectedText || '텍스트'}*`;
                    cursorOffset = selectedText ? replacement.length : 1;
                    break;
                case 'list':
                    replacement = `\n- ${selectedText || '항목'}`;
                    cursorOffset = replacement.length;
                    break;
                case 'todo':
                    replacement = `\n- [ ] ${selectedText || '할 일 입력'}`;
                    cursorOffset = replacement.length;
                    break;
                case 'time':
                    const nowStr = new Date().toLocaleString('ko-KR');
                    replacement = `${nowStr} `;
                    cursorOffset = replacement.length;
                    break;
            }

            textarea.value = text.substring(0, start) + replacement + text.substring(end);
            textarea.focus();
            
            // Restore Selection range appropriately
            const nextCursor = start + cursorOffset;
            textarea.setSelectionRange(nextCursor, nextCursor);
            
            // Trigger autosave dispatching input change
            handleEditorInput();
        }

        // Real-time character layout stats
        function countCharacters() {
            const text = elements.editorContent.value || "";
            const totalChars = text.length;
            const noSpaceChars = text.replace(/\s/g, "").length;
            
            elements.charCount.innerText = totalChars;
            elements.charNoSpaceCount.innerText = noSpaceChars;
        }

        // --- STREAMING_CHUNK: Save & Sync Operations Engine ---
        function handleEditorInput() {
            const noteId = state.activeNoteId;
            if (!noteId) return;

            const note = state.notes.find(n => n.id === noteId);
            if (!note || note.isTrashed) return;

            setAutoSaveStatus('saving');
            countCharacters();

            // Clear any lingering pending timer
            if (state.saveTimeout) {
                clearTimeout(state.saveTimeout);
            }

            // Set debounce delay to prevent overwhelming disk activity on rapid keystrokes
            state.saveTimeout = setTimeout(() => {
                note.title = elements.editorTitle.value;
                note.content = elements.editorContent.value;
                note.updatedAt = new Date().toISOString();
                
                elements.editorDate.innerText = `최근 수정: ${formatDate(note.updatedAt)}`;
                
                saveNotesToStorage();
                renderNoteList();
                updateCounters();
                setAutoSaveStatus('saved');
            }, 800);
        }

        // --- STREAMING_CHUNK: Note CRUD Operations Flow ---
        function createNewNote() {
            const newId = 'note-' + Date.now();
            const newNote = {
                id: newId,
                title: '',
                content: '',
                category: state.currentFilter !== 'trash' && state.currentFilter !== 'pinned' && state.currentFilter !== 'all' ? state.currentFilter : 'uncategorized',
                isPinned: false,
                isTrashed: false,
                updatedAt: new Date().toISOString()
            };

            state.notes.unshift(newNote);
            saveNotesToStorage();
            
            // Force reset active state
            selectNote(newId);
            renderNoteList();
            updateCounters();
            
            // Smooth focus to title
            elements.editorTitle.focus();
            showToast("새 메모가 생성되었습니다.");
        }

        function deleteNote() {
            const noteId = state.activeNoteId;
            if (!noteId) return;

            const noteIndex = state.notes.findIndex(n => n.id === noteId);
            if (noteIndex === -1) return;

            const note = state.notes[noteIndex];

            if (note.isTrashed) {
                // Permanently remove from memory array
                state.notes.splice(noteIndex, 1);
                state.activeNoteId = null;
                localStorage.removeItem('notepad_active_id');
                
                elements.editorWrapper.classList.add('hidden');
                elements.emptyWrapper.classList.remove('hidden');
                
                showToast("메모가 영구적으로 삭제되었습니다.", "danger");
            } else {
                // Move to safety recycle bin (Soft Delete)
                note.isTrashed = true;
                note.isPinned = false; // Always clear pinned status when trashed
                note.updatedAt = new Date().toISOString();
                
                showToast("메모를 휴지통으로 이동했습니다. (30일 뒤 삭제 예정)");
                
                // Switch focus to another valid view or empty
                state.activeNoteId = null;
                localStorage.removeItem('notepad_active_id');
                elements.editorWrapper.classList.add('hidden');
                elements.emptyWrapper.classList.remove('hidden');
            }

            saveNotesToStorage();
            renderNoteList();
            updateCounters();
        }

        function restoreNote(id) {
            const note = state.notes.find(n => n.id === id);
            if (!note) return;

            note.isTrashed = false;
            note.updatedAt = new Date().toISOString();
            
            saveNotesToStorage();
            renderNoteList();
            updateCounters();
            showToast("메모가 성공적으로 복원되었습니다.");
            
            // View restored node instantly
            selectNote(id);
        }

        function togglePin() {
            const noteId = state.activeNoteId;
            if (!noteId) return;

            const note = state.notes.find(n => n.id === noteId);
            if (!note || note.isTrashed) return;

            note.isPinned = !note.isPinned;
            note.updatedAt = new Date().toISOString();
            
            saveNotesToStorage();
            selectNote(noteId); // redraw properties and lists
            showToast(note.isPinned ? "중요 메모로 상단에 고정되었습니다." : "중요 메모 해제");
        }

        function changeCategory(category) {
            const noteId = state.activeNoteId;
            if (!noteId) return;

            const note = state.notes.find(n => n.id === noteId);
            if (!note || note.isTrashed) return;

            note.category = category;
            note.updatedAt = new Date().toISOString();

            saveNotesToStorage();
            renderNoteList();
            updateCounters();
            showToast(`카테고리가 변경되었습니다.`);
        }

        // --- STREAMING_CHUNK: System Integration & Backup Logic ---
        function exportToTXT() {
            const noteId = state.activeNoteId;
            if (!noteId) return;

            const note = state.notes.find(n => n.id === noteId);
            if (!note) return;

            const filename = `${note.title || '제목없음'}_${new Date().toISOString().slice(0,10)}.txt`;
            const content = `${note.title}\n\n최근수정: ${formatDate(note.updatedAt)}\n-----------------------------------\n\n${note.content}`;
            
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
            URL.revokeObjectURL(link.href);
            showToast("텍스트 파일이 다운로드되었습니다.");
        }

        function exportNotes() {
            const dataStr = JSON.stringify(state.notes, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `스마트메모장_백업_${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
            
            URL.revokeObjectURL(url);
            showToast("백업 파일이 안전하게 내보내졌습니다.");
        }

        function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedNotes = JSON.parse(e.target.result);
                    if (Array.isArray(importedNotes)) {
                        // Validate format schema slightly
                        const validNotes = importedNotes.filter(n => n.id && n.title !== undefined);
                        
                        if (validNotes.length > 0) {
                            // Merge imports: Overwrite existing duplicates, insert new
                            const noteMap = new Map(state.notes.map(n => [n.id, n]));
                            validNotes.forEach(n => noteMap.set(n.id, n));
                            state.notes = Array.from(noteMap.values());
                            
                            saveNotesToStorage();
                            renderNoteList();
                            updateCounters();
                            showToast(`${validNotes.length}개의 메모를 성공적으로 불러왔습니다.`);
                        } else {
                            showToast("가져올 수 있는 유효한 메모가 없습니다.", "danger");
                        }
                    } else {
                        showToast("잘못된 파일 형태입니다.", "danger");
                    }
                } catch (err) {
                    showToast("파일을 해석하는 중 오류가 발생했습니다.", "danger");
                }
            };
            reader.readAsText(file);
            // Reset state picker
            event.target.value = '';
        }

        // --- STREAMING_CHUNK: App Theme Sync & Toggle Engine ---
        function applyTheme() {
            if (state.theme === 'dark') {
                document.documentElement.classList.add('dark');
                elements.themeIcon.className = "fa-solid fa-sun text-amber-400";
            } else {
                document.documentElement.classList.remove('dark');
                elements.themeIcon.className = "fa-solid fa-moon";
            }
            localStorage.setItem('notepad_theme', state.theme);
        }

        function toggleTheme() {
            state.theme = state.theme === 'dark' ? 'light' : 'dark';
            applyTheme();
            showToast(state.theme === 'dark' ? "다크 모드가 적용되었습니다." : "라이트 모드가 적용되었습니다.");
        }

        // --- STREAMING_CHUNK: Navigation & Sidebar UI Controllers ---
        function filterNotes(filterType) {
            state.currentFilter = filterType;
            
            // Highlight current category navigation element active styles
            elements.categoryFilters.forEach(btn => {
                const target = btn.getAttribute('data-filter');
                if (target === filterType) {
                    btn.className = "filter-btn w-full flex items-center justify-between px-3 py-1.5 rounded-lg text-sm font-medium bg-brand-50 dark:bg-slate-700 text-brand-600 dark:text-indigo-300";
                } else {
                    btn.className = "filter-btn w-full flex items-center justify-between px-3 py-1.5 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700/50";
                    // Custom style for trash if hovered or active
                    if (target === 'trash') {
                        btn.className = "filter-btn w-full flex items-center justify-between px-3 py-1.5 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-red-50 dark:hover:bg-red-950/20 hover:text-red-600 dark:hover:text-red-400";
                    }
                }
            });

            // If active note does not match filter, close preview on main panel
            if (state.activeNoteId) {
                const active = state.notes.find(n => n.id === state.activeNoteId);
                if (active) {
                    let shouldUnload = false;
                    if (filterType === 'trash' && !active.isTrashed) shouldUnload = true;
                    else if (filterType !== 'trash' && active.isTrashed) shouldUnload = true;
                    else if (filterType === 'pinned' && !active.isPinned) shouldUnload = true;
                    else if (filterType !== 'all' && filterType !== 'pinned' && filterType !== 'trash' && active.category !== filterType) shouldUnload = true;
                    
                    if (shouldUnload) {
                        elements.editorWrapper.classList.add('hidden');
                        elements.emptyWrapper.classList.remove('hidden');
                    }
                }
            }

            renderNoteList();
        }

        function toggleSidebar() {
            elements.sidebar.classList.toggle('-translate-x-full');
            elements.sidebarBackdrop.classList.toggle('hidden');
        }

        // --- STREAMING_CHUNK: App Initialization & Setup Event Hooks ---
        function initApp() {
            loadState();
            applyTheme();
            
            // Assign initial layout count states
            updateCounters();
            renderNoteList();

            if (state.activeNoteId) {
                selectNote(state.activeNoteId);
            }

            // Hook listeners for creation buttons
            elements.btnNewNote.addEventListener('click', createNewNote);
            elements.btnMobileNew.addEventListener('click', createNewNote);
            elements.btnEmptyNew.addEventListener('click', createNewNote);

            // Text input updates
            elements.editorTitle.addEventListener('input', handleEditorInput);
            elements.editorContent.addEventListener('input', handleEditorInput);
            elements.editorCategory.addEventListener('change', (e) => changeCategory(e.target.value));

            // Custom tools binding
            elements.btnEditorPin.addEventListener('click', togglePin);
            elements.btnEditorDelete.addEventListener('click', deleteNote);
            elements.btnExportTxt.addEventListener('click', exportToTXT);
            
            elements.themeToggle.addEventListener('click', toggleTheme);

            // Layout responsiveness toggling triggers
            elements.btnToggleSidebar.addEventListener('click', toggleSidebar);
            elements.sidebarBackdrop.addEventListener('click', toggleSidebar);

            // Search trigger
            elements.searchInput.addEventListener('input', (e) => {
                state.searchQuery = e.target.value;
                renderNoteList();
            });

            // Filter selection trigger loop
            elements.categoryFilters.forEach(btn => {
                btn.addEventListener('click', () => {
                    const filter = btn.getAttribute('data-filter');
                    filterNotes(filter);
                });
            });

            // Backup export actions
            elements.btnExport.addEventListener('click', exportNotes);
            elements.btnImportTrigger.addEventListener('click', () => {
                elements.importFile.click();
            });
            elements.importFile.addEventListener('change', handleImport);

            // Format helper triggers
            elements.formatBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const format = btn.getAttribute('data-format');
                    injectFormatting(format);
                });
            });

            // Ensure window resizing adapts well (reset states if viewport changes)
            window.addEventListener('resize', () => {
                if (window.innerWidth >= 768) {
                    elements.sidebar.classList.remove('-translate-x-full');
                    elements.sidebarBackdrop.classList.add('hidden');
                } else {
                    elements.sidebar.classList.add('-translate-x-full');
                }
            });
        }

        // Run application on load finish
        window.onload = function() {
            initApp();
        };
    </script>
</body>
